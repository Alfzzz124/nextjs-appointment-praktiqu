<body class="bg-background text-on-background font-body text-body min-h-screen flex flex-col antialiased">
<!-- TopAppBar (Transactional - Hidden Nav Links) -->
<header class="bg-surface border-b border-outline-variant shadow-sm docked full-width top-0 z-50">
<div class="flex items-center justify-between px-lg h-16 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-md">
<button aria-label="Go back" class="p-2 rounded-full hover:bg-surface-container-high transition-colors duration-200">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<div class="font-h1-mobile text-h1-mobile md:font-h1 md:text-h1 text-primary tracking-tight">
                    PraktiQU
                </div>
</div>
<div class="flex items-center gap-sm">
<!-- Transactional page, simplified header -->
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-3xl mx-auto px-md md:px-lg py-xl flex flex-col gap-lg">
<!-- Page Title -->
<div>
<h1 class="font-display text-display text-on-surface">Edit Client Profile</h1>
<p class="font-body text-body text-on-surface-variant mt-xs">Update patient information and contact details.</p>
</div>
<!-- Form Container -->
<div class="bg-surface rounded-xl shadow-lg border border-outline-variant p-lg md:p-xl flex flex-col gap-xl">
<!-- Avatar Section -->
<div class="flex flex-col sm:flex-row items-start sm:items-center gap-lg">
<div class="relative group">
<div class="w-24 h-24 rounded-full overflow-hidden border-2 border-primary-container relative">
<img alt="Sarah Wijaya Avatar" class="w-full h-full object-cover" data-alt="A professional headshot of an Asian woman in a clinical or modern office setting. Soft, natural lighting. The color palette is bright and clean, aligning with a professional healthcare environment, featuring subtle cool tones. She has a subtle, friendly smile." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAibnJzH_L8ol6KBBqcsM6ErjkCOfuLkwJ1nIL7oYUP542zJgHXjQTl-h-y0kSWo0gHsV-PJqs56cXhvbAK9txCpmHZC8SMtWdklDj2xNrr6xxqwkiRpMy6IYs4P8B0m_WJ2bxGBbLPyZO9ph5C0-uenuHphmzFhdBnVgF5KUFMIZsFdRN8NZkQLruYYZCFv2M_H53qy3uD5X3KfGjvLQ8aoB1kHQGH38egI-4OO-1zmGfktPXWdvSEErJoTftq4dtmSRRJPlAgc_ED"/>
<div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-200 cursor-pointer">
<span class="material-symbols-outlined text-white" data-icon="photo_camera">photo_camera</span>
</div>
</div>
</div>
<div class="flex flex-col gap-sm">
<button class="bg-surface text-primary border border-primary-container px-4 py-2 rounded-lg font-body-semibold text-body-semibold hover:bg-surface-container-high transition-colors text-left w-fit" type="button">
                        Update Avatar
                    </button>
<p class="font-small text-small text-on-surface-variant">Recommended size: 400x400px. JPG, PNG, or GIF.</p>
</div>
</div>
<!-- Form Fields -->
<form action="#" class="flex flex-col gap-lg" method="POST">
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Name -->
<div class="flex flex-col gap-base">
<label class="font-label text-label text-on-surface" for="fullName">Full Name</label>
<input class="h-10 px-sm border border-outline-variant rounded-lg bg-surface text-on-surface font-body text-body focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-shadow" id="fullName" name="fullName" type="text" value="Sarah Wijaya"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-base">
<label class="font-label text-label text-on-surface" for="email">Email Address</label>
<input class="h-10 px-sm border border-outline-variant rounded-lg bg-surface text-on-surface font-body text-body focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-shadow" id="email" name="email" type="email" value="sarah@email.com"/>
</div>
<!-- Phone -->
<div class="flex flex-col gap-base">
<label class="font-label text-label text-on-surface" for="phone">Phone Number</label>
<input class="h-10 px-sm border border-outline-variant rounded-lg bg-surface text-on-surface font-body text-body focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-shadow" id="phone" name="phone" type="tel" value="0812-3456-7890"/>
</div>
<!-- Status (Example additional field for an edit form) -->
<div class="flex flex-col gap-base">
<label class="font-label text-label text-on-surface" for="status">Status</label>
<select class="h-10 px-sm border border-outline-variant rounded-lg bg-surface text-on-surface font-body text-body focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-shadow appearance-none" id="status" name="status">
<option selected="" value="active">Active</option>
<option value="inactive">Inactive</option>
<option value="discharged">Discharged</option>
</select>
</div>
</div>
<!-- Notes Section (Optional expanding text area) -->
<div class="flex flex-col gap-base">
<label class="font-label text-label text-on-surface" for="notes">Clinical Notes (Internal)</label>
<textarea class="p-sm border border-outline-variant rounded-lg bg-surface text-on-surface font-body text-body focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-shadow resize-y" id="notes" name="notes" placeholder="Add any relevant private notes here..." rows="4"></textarea>
</div>
<!-- Action Buttons -->
<div class="flex justify-end gap-md pt-md border-t border-outline-variant mt-md">
<button class="px-lg h-10 border border-outline text-on-surface bg-surface rounded-lg font-body-semibold text-body-semibold hover:bg-surface-container-high transition-colors" type="button">
                        Cancel
                    </button>
<button class="px-lg h-10 bg-primary-container text-on-primary border border-transparent rounded-lg font-body-semibold text-body-semibold shadow-sm hover:opacity-90 transition-opacity" type="submit">
                        Save Changes
                    </button>
</div>
</form>
</div>
</main>
</body></html>
