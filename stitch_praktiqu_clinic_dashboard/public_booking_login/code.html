<body class="bg-surface-container-low text-on-background min-h-screen flex flex-col items-center justify-center p-md md:p-margin antialiased">
<!-- Main Content Canvas (Navigation Shell Suppressed for Transactional Page) -->
<main class="w-full max-w-[420px] flex flex-col gap-lg">
<!-- Logo Header -->
<div class="flex flex-col items-center justify-center gap-sm mb-sm">
<div class="flex items-center gap-sm text-primary">
<span class="material-symbols-outlined text-[32px]">spa</span>
<span class="font-display text-display tracking-tight">PraktiQU</span>
</div>
</div>
<!-- Login Card -->
<div class="bg-surface rounded-xl shadow-[0px_1px_3px_rgba(0,0,0,0.1),0px_1px_2px_rgba(0,0,0,0.06)] p-gutter md:p-xl flex flex-col gap-lg w-full">
<div class="text-center">
<h1 class="font-h1 text-h1 text-on-surface mb-xs">Welcome Back</h1>
<p class="font-body text-body text-on-surface-variant">Please enter your details to sign in.</p>
</div>
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-small text-small font-bold text-on-surface" for="email">Email Address</label>
<input class="w-full h-[40px] px-sm rounded-lg border border-outline-variant bg-surface text-on-surface font-body text-body focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-small text-small font-bold text-on-surface" for="password">Password</label>
<input class="w-full h-[40px] px-sm rounded-lg border border-outline-variant bg-surface text-on-surface font-body text-body focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between mt-xs">
<label class="flex items-center gap-sm cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-surface bg-surface cursor-pointer" type="checkbox"/>
<span class="font-body text-body text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-body-semibold text-body-semibold text-primary hover:text-surface-tint transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Submit Button -->
<button class="w-full h-[40px] mt-sm bg-primary-container text-on-primary font-body-semibold text-body-semibold rounded-lg hover:bg-surface-tint active:scale-[0.98] transition-all flex items-center justify-center shadow-sm" type="submit">
                    Log In
                </button>
</form>
</div>
<!-- Footer Link -->
<div class="text-center mt-sm">
<p class="font-body text-body text-on-surface-variant">
                Don't have an account? 
                <a class="font-body-semibold text-body-semibold text-primary hover:text-surface-tint transition-colors" href="#">Book a session</a>
</p>
</div>
</main>
</body></html>
