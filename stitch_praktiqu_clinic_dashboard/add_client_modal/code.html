</div>

</a>

<!-- Main Content Canvas -->
<main class="flex-1 lg:ml-[260px] p-md md:p-lg pb-24 md:pb-lg flex flex-col items-center justify-center w-full max-w-7xl mx-auto">
<div class="w-full max-w-lg bg-surface rounded-xl shadow-[0px_1px_3px_rgba(0,0,0,0.1),0px_1px_2px_rgba(0,0,0,0.06)] overflow-hidden border border-surface-variant">
<div class="px-lg py-md border-b border-surface-variant bg-surface-container-low">
<h1 class="font-h2 text-h2 text-on-surface">Add New Client</h1>
<p class="font-small text-small text-on-surface-variant mt-1">Enter patient details to register them in the system.</p>
</div>
<form class="p-lg flex flex-col gap-md">
<!-- Full Name -->
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-on-surface" for="fullName">Full Name <span class="text-error">*</span></label>
<input class="w-full h-10 px-sm border border-[#E2E8F0] rounded font-body text-body text-on-surface placeholder:text-outline focus:outline-none focus:border-[#818CF8] focus:ring-1 focus:ring-[#818CF8] bg-surface transition-colors" id="fullName" name="fullName" placeholder="e.g. Jane Doe" required="" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-on-surface" for="email">Email <span class="text-error">*</span></label>
<input class="w-full h-10 px-sm border border-[#E2E8F0] rounded font-body text-body text-on-surface placeholder:text-outline focus:outline-none focus:border-[#818CF8] focus:ring-1 focus:ring-[#818CF8] bg-surface transition-colors" id="email" name="email" placeholder="jane.doe@example.com" required="" type="email"/>
</div>
<!-- Phone -->
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-on-surface" for="phone">Phone</label>
<input class="w-full h-10 px-sm border border-[#E2E8F0] rounded font-body text-body text-on-surface placeholder:text-outline focus:outline-none focus:border-[#818CF8] focus:ring-1 focus:ring-[#818CF8] bg-surface transition-colors" id="phone" name="phone" placeholder="(555) 123-4567" type="tel"/>
</div>
<!-- Date of Birth -->
<div class="flex flex-col gap-xs relative">
<label class="font-label text-label text-on-surface" for="dob">Date of Birth</label>
<div class="relative flex items-center">
<input class="w-full h-10 pl-sm pr-10 border border-[#E2E8F0] rounded font-body text-body text-on-surface focus:outline-none focus:border-[#818CF8] focus:ring-1 focus:ring-[#818CF8] bg-surface transition-colors appearance-none [&amp;::-webkit-calendar-picker-indicator]:hidden" id="dob" name="dob" type="date"/>
<span class="material-symbols-outlined absolute right-sm text-outline pointer-events-none">calendar_today</span>
</div>
</div>
<!-- Notes -->
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-on-surface" for="notes">Notes</label>
<textarea class="w-full p-sm border border-[#E2E8F0] rounded font-body text-body text-on-surface placeholder:text-outline focus:outline-none focus:border-[#818CF8] focus:ring-1 focus:ring-[#818CF8] bg-surface transition-colors resize-y min-h-[80px]" id="notes" name="notes" placeholder="Any initial clinical notes or context..." rows="3"></textarea>
</div>
<!-- Actions -->
<div class="pt-md mt-sm border-t border-surface-variant flex items-center justify-end gap-md">
<button class="h-10 px-md rounded-lg border border-outline-variant text-[#1E293B] font-body-semibold hover:bg-surface-container transition-colors focus:outline-none focus:ring-2 focus:ring-primary" type="button">
                        Cancel
                    </button>
<button class="h-10 px-md rounded-lg bg-[#5046E5] text-[#ffffff] font-body-semibold hover:bg-[#4338CA] transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#5046E5] shadow-sm" type="submit">
                        Save Client
                    </button>
</div>
</form>
