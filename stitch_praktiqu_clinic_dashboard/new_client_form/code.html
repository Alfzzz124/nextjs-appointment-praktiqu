<form class="flex flex-col gap-5 flex-1">
<div class="flex flex-col gap-1.5">
<label class="font-label text-label text-on-surface" for="fullName">Full Name</label>
<input class="h-10 px-3 w-full bg-surface-container-lowest border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body text-body text-on-surface placeholder:text-outline" id="fullName" placeholder="Jane Doe" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label text-label text-on-surface" for="email">Email Address</label>
<input class="h-10 px-3 w-full bg-surface-container-lowest border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body text-body text-on-surface placeholder:text-outline" id="email" placeholder="jane.doe@example.com" type="email"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<div class="flex flex-col gap-1.5">
<label class="font-label text-label text-on-surface" for="phone">Phone Number</label>
<input class="h-10 px-3 w-full bg-surface-container-lowest border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body text-body text-on-surface placeholder:text-outline" id="phone" placeholder="(555) 000-0000" type="tel"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label text-label text-on-surface" for="dob">Date of Birth</label>
<div class="relative">
<input class="h-10 px-3 w-full bg-surface-container-lowest border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body text-body text-on-surface appearance-none pr-10" id="dob" type="date"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">calendar_today</span>
</div>
</div>
</div>
<div class="mt-4 border-t border-outline-variant pt-5">
<label class="flex items-center cursor-pointer justify-between bg-surface-container-low p-4 rounded-lg border border-outline-variant hover:bg-surface-container-high transition-colors">
<div class="flex flex-col gap-1 pr-4">
<span class="font-body-semibold text-body-semibold text-on-surface">Send intake form via email</span>
<span class="font-small text-small text-on-surface-variant">Client will receive a secure link to complete their medical history prior to the session.</span>
