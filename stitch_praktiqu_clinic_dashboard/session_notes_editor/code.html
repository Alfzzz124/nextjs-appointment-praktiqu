<main class="w-full max-w-[1200px] mx-auto px-md md:px-gutter py-margin flex flex-col gap-lg">
<!-- Header Section -->

<div>

</div>

<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">calendar_today</span>

</div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">schedule</span>
<span>14:00 - 15:00</span>
</div>
</div>
</section>
<!-- SOAP Editor -->
<section class="flex flex-col gap-md">
<!-- Subjective -->
<div class="flex flex-col gap-sm">
<label class="text-label font-label text-on-surface" for="subjective">Subjective</label>
<textarea class="w-full rounded-lg border border-outline-variant bg-surface p-sm text-body font-body text-on-surface focus:border-[#818CF8] focus:ring-1 focus:ring-[#818CF8] transition-colors resize-y" id="subjective" placeholder="Client statements and subjective observations..." rows="3">Client reports feeling less anxious overall this week, but mentioned experiencing two occasional panic attacks during high-stress situations at work. States she tried the breathing exercises with moderate success.</textarea>
</div>
<!-- Objective -->
<div class="flex flex-col gap-sm">
<label class="text-label font-label text-on-surface" for="objective">Objective</label>
<textarea class="w-full rounded-lg border border-outline-variant bg-surface p-sm text-body font-body text-on-surface focus:border-[#818CF8] focus:ring-1 focus:ring-[#818CF8] transition-colors resize-y" id="objective" placeholder="Observable, measurable data..." rows="3">Client appeared calm and engaged during the session. Posture was relaxed. Speech was clear and pace was normal. No visible signs of distress when discussing the workplace incidents.</textarea>
</div>
<!-- Assessment -->
<div class="flex flex-col gap-sm">
<label class="text-label font-label text-on-surface" for="assessment">Assessment</label>
<textarea class="w-full rounded-lg border border-outline-variant bg-surface p-sm text-body font-body text-on-surface focus:border-[#818CF8] focus:ring-1 focus:ring-[#818CF8] transition-colors resize-y" id="assessment" placeholder="Clinical analysis and synthesis..." rows="3">Client is making steady progress with generalized anxiety. The CBT techniques are showing positive effect, though acute stress still triggers panic responses. Insight into her own triggers is improving.</textarea>
</div>
<!-- Plan -->
<div class="flex flex-col gap-sm">
<label class="text-label font-label text-on-surface" for="plan">Plan</label>
<textarea class="w-full rounded-lg border border-outline-variant bg-surface p-sm text-body font-body text-on-surface focus:border-[#818CF8] focus:ring-1 focus:ring-[#818CF8] transition-colors resize-y" id="plan" placeholder="Next steps, interventions, homework..." rows="3">1. Continue CBT focusing on workplace triggers.
2. Review and practice advanced grounding techniques for panic onset.
3. Homework: Maintain anxiety journal specifically noting context around workplace stress.
4. Next session scheduled for June 10, 2026.</textarea>
</div>
