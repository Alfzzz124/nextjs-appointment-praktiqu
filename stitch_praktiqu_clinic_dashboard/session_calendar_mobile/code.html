<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .time-slot::after {
            content: '';
            position: absolute;
            left: 60px;
            right: 0;
            top: 50%;
            height: 1px;
            background-color: #F1F5F9;
            z-index: 0;
        }
    </style>

<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col">
<!-- Top App Bar -->
<header class="bg-surface dark:bg-on-background text-primary dark:text-primary-fixed-dim font-display text-display docked full-width top-0 border-b border-outline-variant dark:border-outline flat no shadows scale-95 active:scale-90 transition-transform flex justify-between items-center w-full px-lg h-[64px] max-w-[1200px] mx-auto z-10 sticky top-0">
<button class="flex items-center justify-center p-sm rounded-full hover:bg-surface-container-high dark:hover:bg-surface-dim transition-colors">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="menu">menu</span>
</button>
<h1 class="font-h1-mobile text-h1-mobile text-primary dark:text-primary-fixed-dim font-bold">Session Management</h1>
<div class="w-8 h-8 rounded-full bg-surface-variant overflow-hidden flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="account_circle">account_circle</span>
</div>
</header>
<!-- Day Selector (Swipeable) -->
<div class="bg-surface sticky top-[64px] z-10 border-b border-outline-variant/30 py-sm shadow-[0px_1px_3px_rgba(0,0,0,0.05)]">
<div class="flex overflow-x-auto hide-scrollbar px-md gap-sm snap-x">
<!-- Previous days -->
<button class="flex flex-col items-center justify-center min-w-[60px] py-sm rounded-lg hover:bg-surface-container transition-colors snap-start text-on-surface-variant dark:text-outline-variant">
<span class="font-small text-small">Sun</span>
<span class="font-body-semibold text-body-semibold mt-xs">26</span>
</button>
<!-- Active day -->
<button class="flex flex-col items-center justify-center min-w-[60px] py-sm rounded-lg bg-primary-container text-on-primary-container snap-start shadow-[0px_1px_3px_rgba(0,0,0,0.1),0px_1px_2px_rgba(0,0,0,0.06)]">
<span class="font-small text-small">Mon</span>
<span class="font-body-semibold text-body-semibold mt-xs">27</span>
</button>
<!-- Future days -->

<span class="font-body-semibold text-body-semibold mt-xs">28</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[60px] py-sm rounded-lg hover:bg-surface-container transition-colors snap-start text-on-surface-variant dark:text-outline-variant">

<span class="font-body-semibold text-body-semibold mt-xs">29</span>
</button>

<span class="font-body-semibold text-body-semibold mt-xs">30</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[60px] py-sm rounded-lg hover:bg-surface-container transition-colors snap-start text-on-surface-variant dark:text-outline-variant">
<span class="font-small text-small">Fri</span>
<span class="font-body-semibold text-body-semibold mt-xs">31</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[60px] py-sm rounded-lg hover:bg-surface-container transition-colors snap-start text-on-surface-variant dark:text-outline-variant">
<span class="font-small text-small">Sat</span>
<span class="font-body-semibold text-body-semibold mt-xs">1</span>
</button>

</div>

<div class="px-md py-lg">
<!-- Timeline Container -->
<div class="relative">
<!-- 08:00 -->
<div class="relative h-[80px] time-slot flex">
<div class="w-[50px] flex-shrink-0 text-right pr-sm pt-xs">
<span class="font-small text-small text-on-surface-variant">08:00</span>
</div>
<div class="flex-1 relative">
<!-- Session Block -->
<div class="absolute top-[10px] left-0 right-0 h-[100px] bg-secondary-fixed border border-secondary-fixed-dim rounded-lg shadow-[0px_1px_3px_rgba(0,0,0,0.1),0px_1px_2px_rgba(0,0,0,0.06)] p-sm z-10 overflow-hidden flex flex-col">
<div class="flex justify-between items-start">
<h3 class="font-body-semibold text-body-semibold text-on-secondary-fixed">Initial Assessment</h3>
<span class="bg-white/50 text-on-secondary-fixed font-small text-small px-2 py-0.5 rounded-full">Confirmed</span>
</div>
<p class="font-body text-body text-on-secondary-fixed-variant mt-xs">Sarah Jenkins</p>
<p class="font-small text-small text-on-secondary-fixed-variant mt-auto flex items-center gap-1">

                            </p>
</div>
</div>
</div>

</div>

<span class="font-small text-small text-on-surface-variant">10:00</span>
</div>
<div class="flex-1 relative">

<div class="absolute top-[30px] left-[-10px] right-0 flex items-center z-20 pointer-events-none">
<div class="w-2 h-2 rounded-full bg-error"></div>
<div class="h-[1px] flex-1 bg-error"></div>
</div>
</div>
</div>

<div class="flex justify-between items-center">
<div>

</div>
<span class="bg-white/50 text-on-tertiary-fixed font-small text-small px-2 py-0.5 rounded-full">Checked In</span>
</div>
</div>
</div>
</div>

<span class="font-small text-small text-on-surface-variant">12:00</span>

<div class="flex-1 relative">

<span class="font-body text-body text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="restaurant">restaurant</span> Lunch Break
                            </span>
</div>
</div>
</div>

<span class="font-small text-small text-on-surface-variant">13:00</span>

</div>

</button>

<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container dark:bg-primary dark:text-on-primary rounded-xl px-md py-xs hover:bg-primary-fixed dark:hover:bg-primary-fixed-dim transition-colors scale-95 active:scale-90 w-full max-w-[80px]">

</button>

<span class="material-symbols-outlined mb-1" data-icon="account_circle">account_circle</span>

<script>
        // Simple script to auto-scroll timeline to current time roughly
        document.addEventListener('DOMContentLoaded', () => {
            const mainContent = document.querySelector('main');
            if(mainContent) {
                 // Scroll slightly down to center the morning appointments
                 mainContent.scrollTop = 40; 
            }
        });
    </script>
