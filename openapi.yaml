        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
      security:
      - serviceToken: []
      parameters:
      - name: hook
        in: query
        required: true
        schema:
          type: string
      - name: args
        in: query
        required: false
        schema:
          type: array
          items: {}
  /praktiqu/v1/media:
    post:
      tags:
      - praktiqu
      summary: POST /praktiqu/v1/media
      description: >-
        Sideload one file into the WordPress media library and return its
        attachment id. Service-to-service only. Files land in a flat
        kivicare-* subfolder chosen by `context`.
      operationId: post_praktiqu_v1_media
      responses:
        '200':
          description: Attachment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  mediaId:
                    type: integer
                    description: WordPress attachment ID
                  url:
                    type: string
                  name:
                    type: string
                required:
                - mediaId
                - url
                - name
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '413':
          $ref: '#/components/responses/Error'
      security:
      - serviceToken: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                context:
                  type: string
                  enum:
                  - medical-report
                  - custom-field
                  default: custom-field
              required:
              - file
  /praktiqu/v1/users/lookup:
    post:
      tags:
      - praktiqu
      summary: POST /praktiqu/v1/users/lookup
      operationId: post_praktiqu_v1_users_lookup
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
      security:
      - serviceToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
              required:
              - email
  /praktiqu/v1/users/{id}:
    get:
      tags:
      - praktiqu
      summary: GET /praktiqu/v1/users/{id}
      operationId: get_praktiqu_v1_users_id
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
      security:
      - serviceToken: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
  /praktiqu/v1/users/{id}/change-password:
    post:
      tags:
      - praktiqu
      summary: POST /praktiqu/v1/users/{id}/change-password
      operationId: post_praktiqu_v1_users_id_change_password
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
      security:
      - serviceToken: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newPassword:
                  type: string
                invalidateTokens:
                  type: boolean
                  default: true
              required:
              - newPassword
components:
  securitySchemes:
    serviceToken:
      type: apiKey
      in: header
      name: X-PraktiQU-Service-Token
      description: Shared service token for /praktiqu/v1 endpoints.
    cookieAuth:
      type: apiKey
      in: cookie
      name: wordpress_logged_in
      description: WordPress logged-in cookie.
    nonce:
      type: apiKey
      in: header
      name: X-WP-Nonce
      description: WordPress REST nonce (wp_rest).
  responses:
    Success:
      description: Standard KiviCare success envelope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Envelope'
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Envelope'
  schemas:
    Envelope:
      type: object
      properties:
        status:
          type: boolean
        message:
          type: string
        data:
          nullable: true
