        '403':
          $ref: '#/components/responses/Error'
      security:
      - cookieAuth: []
        nonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items: {}
                  description: Array of appointment IDs
              required:
              - ids
