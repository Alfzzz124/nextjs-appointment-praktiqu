openapi: 3.0.3
info:
  title: KiviCare REST API
  description: Auto-generated from the KiviCare WordPress plugin family (kivicare-clinic-management-system,
    kivicare-pro, addons) and the praktiqu-endpoint integration plugin. Parameters are derived by static
    analysis of register_rest_route()/registerRoute() calls; response bodies for kivicare/v1 routes use
    the common {status, message, data} envelope.
  version: 1.0.0
servers:
- url: '{baseUrl}/wp-json'
  variables:
    baseUrl:
      default: https://example.com
tags:
- name: appointments
- name: auth
- name: bills
- name: clinic-schedules
- name: clinics
- name: config
- name: custom-forms
- name: dashboard
- name: doctor-services
- name: doctor-sessions
- name: doctors
- name: encounter-templates
- name: encounters
- name: frontend
- name: gdpr
- name: import
- name: medical-history
- name: patient-medical-reports
- name: patients
- name: praktiqu
- name: prescriptions
- name: pro
- name: rating
- name: receptionists
- name: reports
- name: server-key
- name: service-sessions
- name: setting
- name: settings
- name: setup-wizard
- name: static-data
- name: system
- name: taxes
paths:
  /kivicare/v1/appointments:
    get:
      tags:
      - appointments
      summary: GET /kivicare/v1/appointments
      operationId: get_kivicare_v1_appointments
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
      security:
      - cookieAuth: []
        nonce: []
      parameters:
      - name: search
        in: query
        required: false
        schema:
          type: string
        description: Search term to filter results
      - name: date
        in: query
        required: false
        schema:
          type: string
        description: Date (YYYY-MM-DD)
      - name: date_from
        in: query
        required: false
        schema:
          type: string
        description: Date (YYYY-MM-DD)
      - name: date_to
        in: query
        required: false
        schema:
          type: string
        description: Date (YYYY-MM-DD)
      - name: timezone
        in: query
        required: false
        schema:
          type: string
        description: Timezone for date/time display (e.g., America/New_York, Asia/Kolkata). Defaults to
          WordPress timezone.
      - name: clinic
        in: query
        required: false
        schema:
          type: integer
        description: Filter by clinic ID
      - name: doctor
        in: query
        required: false
        schema:
          type: integer
        description: Filter by doctor ID
      - name: patient
        in: query
        required: false
        schema:
          type: integer
        description: Filter by patient ID
      - name: status
        in: query
        required: false
        schema:
          type: integer
        description: 'Filter by appointment status (0: cancel, 1: Booked, 2: Check-In, 3: Check-Out, 4:
          Pending)'
      - name: orderby
        in: query
        required: false
        schema:
          type: string
        description: Sort results by specified field
      - name: order
        in: query
        required: false
        schema:
          type: string
        description: Sort direction (asc or desc)
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
        description: Current page of results
      - name: perPage
        in: query
        required: false
        schema:
          type: string
          default: 10
        description: Number of results per page
      - name: timeFrame
        in: query
        required: false
        schema:
          type: string
        description: Filter by time frame (all, upcoming, past)
    post:
      tags:
      - appointments
      summary: POST /kivicare/v1/appointments
      operationId: post_kivicare_v1_appointments
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
      security:
      - cookieAuth: []
        nonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appointmentStartDate:
                  type: string
                  description: Date (YYYY-MM-DD)
                appointmentStartTime:
                  type: string
                  description: Time (HH:MM)
                clinicId:
                  type: integer
                  description: Clinic ID
                doctorId:
                  type: integer
                  description: Doctor ID
                serviceId:
                  type: string
                  description: Service data (array or JSON string)
                patientId:
                  type: integer
                  description: Patient ID
                paymentGateway:
                  type: string
                  description: Payment Gateway
                description:
                  type: string
                  description: Appointment description
                status:
                  type: integer
                  description: 'Appointment status (0: Cancelled, 1: Booked, 2: Pending, 3: Check-Out,
                    4: Check-In)'
                page_id:
                  type: integer
                  description: Page ID for frontend appointment booking
                timezone:
                  type: string
                  description: Timezone for appointment
              required:
              - serviceId
  /kivicare/v1/appointments/bulk/delete:
    post:
      tags:
      - appointments
      summary: POST /kivicare/v1/appointments/bulk/delete
      operationId: post_kivicare_v1_appointments_bulk_delete
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/Error'
        '401':
