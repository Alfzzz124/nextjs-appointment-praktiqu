      security:
      - cookieAuth: []
        nonce: []
      parameters:
      - name: format
        in: query
        required: true
        schema:
          type: string
        description: Export format (csv, xls, pdf)
      - name: search
        in: query
        required: false
        schema:
          type: string
        description: Search term to filter results
      - name: date
        in: query
        required: false
        schema:
          type: string
        description: Date (YYYY-MM-DD)
      - name: date_from
        in: query
        required: false
        schema:
          type: string
        description: Filter appointments from this date (YYYY-MM-DD)
      - name: date_to
        in: query
        required: false
        schema:
          type: string
        description: Filter appointments to this date (YYYY-MM-DD)
      - name: clinic
        in: query
        required: false
        schema:
          type: integer
        description: Filter by clinic ID
      - name: doctor
        in: query
        required: false
        schema:
          type: integer
        description: Filter by doctor ID
      - name: patient
        in: query
        required: false
        schema:
          type: integer
        description: Filter by patient ID
      - name: status
        in: query
        required: false
        schema:
          type: integer
        description: 'Filter by appointment status (0: Cancelled, 1: Booked, 2: Pending, 3: Check-Out,
          4: Check-In)'
      - name: timeFrame
        in: query
        required: false
        schema:
          type: string
        description: Time frame filter (all, upcoming, past)
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
        description: Current page of results
      - name: perPage
        in: query
        required: false
        schema:
          type: string
          default: 10
        description: Number of results per page
