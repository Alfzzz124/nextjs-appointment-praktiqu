  /api/v1/sessions/payment-cancel:
    post:
      tags:
      - sessions
      summary: Create payment cancel
      operationId: post_api_v1_sessions_payment_cancel
      description: >-
        Staff-only. Re-checks payment status for a bill — used as the
        landing endpoint when staff return from a cancelled WooCommerce
        checkout. Identical behavior to
        `POST /api/v1/sessions/payment-success`: the payment webhook, not
        the browser redirect, is the source of truth for what actually
        happened, so both landing endpoints simply report current status.


        **Response envelope:** `{ data: PaymentStatusView }` / RFC-7807
        problem+json.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                billId:
                  type: string
              required:
              - billId
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PaymentStatusView'
                required:
                - data
        '400':
          description: Missing billId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: No payment order exists for this bill
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
      security:
      - bearerAuth: []
  /api/v1/sessions/payment-success:
    post:
      tags:
      - sessions
      summary: Create payment success
      operationId: post_api_v1_sessions_payment_success
      description: >-
        Staff-only. Re-checks payment status for a bill — used as the
        landing endpoint when staff return from a successful WooCommerce
        checkout. Identical behavior to
        `POST /api/v1/sessions/payment-cancel`: the payment webhook, not
        the browser redirect, is the source of truth for what actually
        happened, so both landing endpoints simply report current status.


        **Response envelope:** `{ data: PaymentStatusView }` / RFC-7807
        problem+json.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                billId:
                  type: string
              required:
              - billId
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PaymentStatusView'
                required:
                - data
        '400':
          description: Missing billId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: No payment order exists for this bill
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
      security:
      - bearerAuth: []
  /api/v1/sessions/payment-verify:
    post:
      tags:
      - sessions
      summary: Payment Verify (POST) — sessions
      operationId: post_api_v1_sessions_payment_verify
      description: >-
        Staff-only. Ensures a payment order exists for a bill: if none
        exists, or the existing one is `failed`/`expired`/`cancelled`, a
        fresh WooCommerce/Xendit checkout is created and its URL returned;
        otherwise the existing (non-terminal) order's current status is
        returned with `checkoutUrl: null`.


        **Response envelope:** `{ data: SessionPaymentEnsureResult }` /
        RFC-7807 problem+json.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                billId:
                  type: string
              required:
              - billId
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SessionPaymentEnsureResult'
                required:
                - data
        '400':
          description: Missing billId, or an underlying KcError (e.g. bill
            not found)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - bearerAuth: []
  /api/v1/sessions/payment-webhook:
    post:
      tags:
      - sessions
      summary: Create payment webhook
      operationId: post_api_v1_sessions_payment_webhook
      description: >-
        WooCommerce/Xendit payment webhook. Authenticated by an HMAC
        signature over the raw request body (see `webhookSignature`
        below), **not** a bearer JWT. Drives the actual status
        transitions for both public and session payment orders — the
        other payment endpoints only read state this webhook writes.


        **Response envelope:** `{status: boolean, message: string}` (KC
        style) for every outcome, including errors — never RFC-7807.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  enum:
                  - payment.completed
                  - payment.failed
                  - payment.expired
                wcOrderId:
                  type: integer
                amountPaid:
                  type: number
                transactionId:
                  type: string
              required:
              - event
              - wcOrderId
      responses:
        '200':
          description: Processed (or already-processed, idempotently)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KcEnvelope'
        '400':
          description: Body is not valid JSON, or fails the payload schema
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KcEnvelope'
        '401':
          description: Missing or invalid X-PraktiQU-Webhook-Signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KcEnvelope'
        '404':
          description: No payment order matches wcOrderId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KcEnvelope'
        '409':
          description: payment.completed amount does not match the expected
            amount within tolerance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KcEnvelope'
      security:
      - webhookSignature: []
