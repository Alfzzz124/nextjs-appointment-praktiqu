  /api/v1/custom-fields/file-upload:
    post:
      tags:
      - custom-fields
      summary: File Upload (POST) — custom fields
      operationId: post_api_v1_custom_fields_file_upload
      description: >-
        Accepts multipart/form-data and returns WordPress media attachment
        ids. Authenticated users only; `context=medical-report` is
        staff-only (SUPER_ADMIN/CLINIC_ADMIN/PROFESSIONAL/RECEPTIONIST) —
        `context=custom-field` (the default) is open to every authenticated
        role. Every file is validated (magic-byte sniff, extension
        agreement, 10 MB cap, max 10 files per request) before any file is
        written, so a validation failure never leaves orphaned media
        behind. Next.js forwards accepted files to the WordPress plugin's
        `POST /praktiqu/v1/media`, which performs the actual sideload — see
        that operation in the repo-root OpenAPI doc for the other half of
        the bridge.


        **Response envelope:** plain REST, not the KiviCare
        `{status,message,data}` envelope. Error bodies follow RFC-7807
        shape but are not the generic `ValidationProblem` (`errors[]`) —
        see `UploadValidationProblem` below.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: One or more files. Max 10 per request.
                context:
                  type: string
                  enum:
                  - medical-report
                  - custom-field
                  default: custom-field
              required:
              - file
      responses:
        '201':
          description: All files sideloaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResult'
        '207':
          description: Some files sideloaded, some failed after validation passed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResult'
        '400':
          description: Not multipart/form-data, or no file part present
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 'context=medical-report requested by a non-staff role'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: A file failed validation (type/size), or more than 10
            files were sent. Nothing is written in this case.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadValidationProblem'
        '502':
          description: Every accepted file failed to sideload into WordPress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadValidationProblem'
      security:
      - bearerAuth: []
