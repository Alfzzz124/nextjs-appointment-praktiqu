  /api/v1/public/payment-verify:
    post:
      tags:
      - public
      summary: Payment Verify (POST) — public
      operationId: post_api_v1_public_payment_verify
      description: >-
        Guest polls the current payment status for a pending appointment,
        using the signed appointment token from booking (not a JWT). The
        webhook (`POST /api/v1/sessions/payment-webhook`), not this
        endpoint, is the source of truth for status transitions — this
        only reads current state.


        **Response envelope:** `{ data: PaymentStatusView }` / RFC-7807
        problem+json.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: Signed appointment token (see
                    `POST /api/v1/public/booking`).
              required:
              - token
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PaymentStatusView'
                required:
                - data
        '400':
          description: Missing/invalid body, or invalid/expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: No payment order exists for this appointment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
      security: []
  /api/v1/public/payments:
    post:
      tags:
      - public
      summary: Initiate Payment (POST) — public
      operationId: post_api_v1_public_payments
      description: >-
        Guest initiates a WooCommerce/Xendit checkout for a pending
        appointment, using the signed appointment token from booking (not
        a JWT). Fails if the appointment isn't `PENDING`, or if a payment
        was already initiated and is still pending — poll
        `POST /api/v1/public/payment-verify` instead in that case.


        **Response envelope:** `{ data: { checkoutUrl } }` / RFC-7807
        problem+json.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: Signed appointment token (see
                    `POST /api/v1/public/booking`).
              required:
              - token
      responses:
        '201':
          description: Checkout created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CheckoutUrlResult'
                required:
                - data
        '400':
          description: Missing/invalid body, or invalid/expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Appointment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Appointment not awaiting payment, or payment already
            initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
      security: []
