openapi: 3.0.3
info:
  title: PraktiQU API (Next.js /api/v1)
  description: 'Complete REST surface of the PraktiQU Next.js app — the native features (auth, sessions,
    professionals, clients, practices, bills, taxes, consent, custom-fields, email-templates, session-notes,
    intervention-plans) plus the KiviCare port (encounters, prescriptions, medical-history, patient-medical-reports,
    receptionists, doctor-sessions, schedules, dashboard, import, ratings, followups, gdpr).


    Two response conventions coexist: **KC modules** return `{status, message, data}` (see `KcEnvelope`);
    **standard modules** return the entity/`data` directly or an RFC-7807 `problem+json` error. Auth is
    a Bearer JWT except `/api/v1/public/*` and the login/register endpoints. KC endpoints are additionally
    gated by a capability (shown per operation); a role lacking it gets 403.


    Generated from the route files — the endpoint inventory is exhaustive; request-body schemas are generic
    objects except where a named schema is provided.'
  version: 1.0.0
  contact:
    name: PraktiQU
    url: https://praktiqu.com
