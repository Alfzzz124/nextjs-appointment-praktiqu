components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    webhookSignature:
      type: apiKey
      in: header
      name: X-PraktiQU-Webhook-Signature
      description: HMAC signature of the raw request body, verified by
        verifyPaymentWebhookSignature. Not a bearer JWT.
  schemas:
    KcEnvelope:
      type: object
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
        data: {}
      required:
      - status
    StandardResponse:
      type: object
      description: Standard modules return the entity directly or under `data`.
      properties:
        data: {}
    Problem:
      type: object
      description: RFC-7807 problem detail.
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
    ValidationProblem:
      allOf:
      - $ref: '#/components/schemas/Problem'
      - type: object
        properties:
          errors:
            type: array
            items:
              type: object
              properties:
                field:
                  type: string
                message:
                  type: string
    UploadResult:
      type: object
      description: One entry per submitted file, in the order the files were sent.
      properties:
        files:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              mediaId:
                type: integer
                description: WordPress attachment ID. Present when this file
                  sideloaded successfully.
              url:
                type: string
                description: Present when this file sideloaded successfully.
              error:
                type: string
                description: Present when this file failed to sideload.
      required:
      - files
    PaymentStatusView:
      type: object
      description: Current payment order status for an appointment or bill.
      properties:
        status:
          type: string
          enum:
          - pending
          - paid
          - failed
          - expired
          - cancelled
        expectedAmount:
          type: number
          description: Amount (IDR) expected for this payment order.
      required:
      - status
      - expectedAmount
    CheckoutUrlResult:
      type: object
      properties:
        checkoutUrl:
          type: string
      required:
      - checkoutUrl
    SessionPaymentEnsureResult:
      allOf:
      - $ref: '#/components/schemas/PaymentStatusView'
      - type: object
        properties:
          checkoutUrl:
            type: string
            nullable: true
            description: Present when a fresh checkout was created; null
              when an existing non-terminal order's status was returned
              instead.
        required:
        - checkoutUrl
    UploadValidationProblem:
      description: RFC-7807 problem, optionally carrying a per-file breakdown.
        `files` is present when validation failures or sideload failures are
        attributable to specific files (e.g. a magic-byte/extension mismatch);
        it is absent for request-level failures (e.g. more than 10 files sent).
      allOf:
      - $ref: '#/components/schemas/Problem'
      - type: object
        properties:
          files:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                error:
                  type: string
  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Authenticated but lacks the required capability/role
      content:
        application/json:
          schema:
